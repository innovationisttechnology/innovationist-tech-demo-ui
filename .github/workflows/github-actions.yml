name: CI / CD
run-name: ${{ github.ref_name == 'main' && 'Deploy' || 'Build' }} ${{ github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref_name == 'main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-ui:latest
            ${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'
    steps:
      - name: Deploy on EC2 (pull + restart container)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-ui:latest"
            CONTAINER="innovationist-tech-demo-ui"

            # Authenticate without exposing the password in the process list.
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull "$IMAGE"

            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 3001:3001 \
              -e NODE_ENV=production \
              "$IMAGE"

            # Wait for the container to report healthy/running; roll back is manual but
            # at least fail the deploy loudly if it crashes on boot.
            sleep 5
            if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER")" != "true" ]; then
              echo "Container failed to start:"
              docker logs --tail 50 "$CONTAINER" || true
              exit 1
            fi

            docker image prune -f
